name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Gate the deploy on the test suite: release PRs opened by GITHUB_TOKEN don't
  # trigger CI, and CI skips pushes to main, so without this a release could
  # deploy untested code.
  test:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen # release bumps pyproject version but not uv.lock; see ci.yml
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  deploy:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      FLY_ORG: ${{ vars.FLY_ORG || 'personal' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1

      # Idempotent: create the app on first deploy, skip if it already exists.
      # (Requires an org-scoped FLY_API_TOKEN, or a pre-created app + deploy token.)
      # The token is scoped to just these steps rather than the whole job.
      - name: Ensure Fly app exists
        run: flyctl status --app kobo2readwise >/dev/null 2>&1 || flyctl apps create kobo2readwise --org "$FLY_ORG"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
