name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ vars.FLY_ORG || 'personal' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Idempotent: create the app on first deploy, skip if it already exists.
      # (Requires an org-scoped FLY_API_TOKEN, or a pre-created app + deploy token.)
      - name: Ensure Fly app exists
        run: flyctl status --app kobo2readwise >/dev/null 2>&1 || flyctl apps create kobo2readwise --org "$FLY_ORG"

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
